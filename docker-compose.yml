services:
  postgres-data:
    image: postgres:16-alpine
    container_name: postgres-data
    environment:
      POSTGRES_USER: ${DB_USER:-pipeline}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pipeline_dev_2026}
      POSTGRES_DB: ${DB_NAME:-github_data}
    volumes:
      - data_postgres:/var/lib/postgresql/data
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pipeline}"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  postgres-airflow:
    image: postgres:16-alpine
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # Corre solo la primera vez: aplica migraciones y crea el usuario admin.
  # Después queda como "exited"
  airflow-init:
    image: apache/airflow:2.10.4-python3.12
    depends_on:
      postgres-airflow:
        condition: service_healthy
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__WEBSERVER__SECRET_KEY: change_me_in_prod
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-docker"
      HOST_PROJECT_DIR: ${HOST_PROJECT_DIR}
      # Variables que el DAG necesita para armar el environment del extractor.
      # Docker Compose lee el .env de este mismo directorio automáticamente.
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID}
      DRIVE_CONFIG_FILENAME: ${DRIVE_CONFIG_FILENAME:-config.json}
      DB_USER: ${DB_USER:-pipeline}
      DB_PASSWORD: ${DB_PASSWORD:-pipeline_dev_2026}
      DB_NAME: ${DB_NAME:-github_data}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs

  airflow-webserver:
    image: apache/airflow:2.10.4-python3.12
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      # Compartimos el socket de Docker para que el DAG pueda lanzar
      - /var/run/docker.sock:/var/run/docker.sock
    command: webserver
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    image: apache/airflow:2.10.4-python3.12
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    restart: unless-stopped

volumes:
  data_postgres:
  airflow_postgres:
  airflow_logs:

networks:
  default:
    name: pipeline-net